# Depot CI Migration
# Source: .github/workflows/windows-build.yml
#
# Changes made:
# - Changed runs-on from "windows-latest" to "depot-ubuntu-latest" in job "build-windows"

name: Build Windows App
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  build-windows:
    runs-on: depot-ubuntu-latest # was: windows-latest. Nonstandard GitHub runner label detected, changed to default Depot runner.
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build Windows app
        shell: cmd
        run: build_windows_app.cmd
      - name: Package Windows app
        shell: pwsh
        run: |
          $stagingDir = Join-Path $env:RUNNER_TEMP "xmd-release"
          $zipPath = Join-Path $PWD "dist\X-Media-Downloader-windows.zip"

          if (Test-Path $stagingDir) {
            Remove-Item -Recurse -Force $stagingDir
          }

          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
          Copy-Item -Recurse -Force "dist\X Media Downloader" $stagingDir

          if (Test-Path $zipPath) {
            Remove-Item -Force $zipPath
          }

          Compress-Archive -Path (Join-Path $stagingDir "X Media Downloader") -DestinationPath $zipPath
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: xmd-windows-build
          path: dist/X-Media-Downloader-windows.zip
          retention-days: 30
      - name: Publish release asset for tags
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = "dist\X-Media-Downloader-windows.zip"

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag $asset --title "X Media Downloader $tag" --notes "Automated Windows build."
          } else {
            gh release upload $tag $asset --clobber
          }
